version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: production
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tickets
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface   # persist downloaded models
      - faiss_data:/app/data                   # persist FAISS index
    deploy:
      resources:
        limits:
          memory: 4G        # BART needs ~1.6GB, DistilBERT ~300MB, MiniLM ~90MB
          cpus: "2.0"

volumes:
  pgdata:
  model_cache:
  faiss_data:
